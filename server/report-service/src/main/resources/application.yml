# =============================================================================
# Report Service — Application Configuration
# =============================================================================
# Flight history and operational analytics. Provides reporting endpoints
# for dashboards and data export.
# =============================================================================

server:
  port: 8084

spring:
  application:
    name: report-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${REPORT_DB_NAME:report_db}
    username: ${POSTGRES_USER:uasfleet_admin}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.uasfleet.report: DEBUG
