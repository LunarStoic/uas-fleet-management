# =============================================================================
# UAS Fleet Management — Docker Compose (Full Stack)
# =============================================================================
# Runs the ENTIRE application stack with a single command:
#
#   docker-compose up -d --build
#
# ARCHITECTURE (11 services):
#   Infrastructure:  postgres, rabbitmq
#   Service Discovery: eureka-server
#   API Gateway:     api-gateway
#   Java Services:   auth-service, fleet-service, order-service, report-service
#   Python Services: dispatch-engine, telemetry-gateway
#   Frontend:        client (Nginx)
#
# STARTUP ORDER (managed by depends_on + healthchecks):
#   postgres/rabbitmq → eureka-server → java services → api-gateway → client
# =============================================================================

services:
  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — Primary RDBMS (Database-per-Service)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: uas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d report_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - uas-net

  # ---------------------------------------------------------------------------
  # RabbitMQ 3.13 — Message Broker
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: uas-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - uas-net

  # ===========================================================================
  # JAVA MICROSERVICES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Eureka Server — Service Discovery (MUST start first)
  # ---------------------------------------------------------------------------
  eureka-server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: eureka-server
    container_name: uas-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      EUREKA_HOST: eureka-server
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8761/actuator/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - uas-net

  # ---------------------------------------------------------------------------
  # API Gateway — Single Entry Point (port 8080)
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: uas-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - uas-net

  # ---------------------------------------------------------------------------
  # Auth Service (port 8081)
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: uas-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      JPA_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - uas-net

  # ---------------------------------------------------------------------------
  # Fleet Service (port 8082)
  # ---------------------------------------------------------------------------
  fleet-service:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: fleet-service
    container_name: uas-fleet
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FLEET_DB_NAME: ${FLEET_DB_NAME}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      JPA_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - uas-net

  # ---------------------------------------------------------------------------
  # Order Service (port 8083)
  # ---------------------------------------------------------------------------
  order-service:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    container_name: uas-order
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ORDER_DB_NAME: ${ORDER_DB_NAME}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      JPA_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - uas-net

  # ---------------------------------------------------------------------------
  # Report Service (port 8084)
  # ---------------------------------------------------------------------------
  report-service:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: report-service
    container_name: uas-report
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPORT_DB_NAME: ${REPORT_DB_NAME}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      JPA_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - uas-net

  # ===========================================================================
  # PYTHON SERVICES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Telemetry Gateway — WebSocket Server (port 8000)
  # ---------------------------------------------------------------------------
  telemetry-gateway:
    build:
      context: ./telemetry-gateway
      dockerfile: Dockerfile
    container_name: uas-telemetry
    restart: unless-stopped
    ports:
      - "8091:8091"
    networks:
      - uas-net

  # ---------------------------------------------------------------------------
  # Dispatch Engine — VRP Route Optimizer (port 8091)
  # ---------------------------------------------------------------------------
  dispatch-engine:
    build:
      context: ./dispatch-engine
      dockerfile: Dockerfile
    container_name: uas-dispatch
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      FLEET_SERVICE_URL: http://fleet-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      TELEMETRY_GATEWAY_URL: http://telemetry-gateway:8091
    depends_on:
      rabbitmq:
        condition: service_healthy
      fleet-service:
        condition: service_started
      order-service:
        condition: service_started
      telemetry-gateway:
        condition: service_started
    networks:
      - uas-net

  # ===========================================================================
  # FRONTEND
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # React Client — Nginx (port 3000 → maps to container port 80)
  # ---------------------------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: uas-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
      - telemetry-gateway
    networks:
      - uas-net

# =============================================================================
# Networks
# =============================================================================
networks:
  uas-net:
    driver: bridge
    name: uas-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: uas-postgres-data
  rabbitmq_data:
    name: uas-rabbitmq-data
